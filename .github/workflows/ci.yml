name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install system audio dependency for librosa
        run: sudo apt-get update && sudo apt-get install -y libsndfile1

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .[test]

      - name: Smoke tests
        run: pytest tests/ -v

      - name: M47 micro-benchmark (10K messages)
        run: python benchmark.py 10000 200

      - name: Edge unified benchmark (5K AIS, 20 frames, 10 audio chunks)
        run: python edge/edge_benchmark.py 5000 20 10
